<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill Login Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        .login-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .credentials-section {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            overflow-y: auto;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .credentials-display {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .credentials-display.show {
            display: block;
        }

        .cred-title {
            color: #fff;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cred-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #00f2fe;
        }

        .cred-label {
            color: #00f2fe;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cred-value {
            color: #fff;
            font-size: 1.1em;
            margin-top: 5px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            display: none;
        }

        .send-btn.show {
            display: block;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }

        .success-message {
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            text-align: center;
            animation: slideIn 0.4s ease;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .credentials-section {
                border-left: none;
                border-top: 2px solid rgba(255, 255, 255, 0.2);
                flex: 0.8;
            }

            .login-section {
                flex: 1;
            }
        }

        @media (max-width: 600px) {
            .login-box {
                padding: 30px;
            }

            h1 {
                font-size: 1.5em;
            }

            .credentials-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="login-box">
                <h1>Welcome</h1>
                <p class="subtitle">Sign in to continue</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required placeholder="Enter your username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                </form>
            </div>
        </div>

        <div class="credentials-section">
            <div class="credentials-display" id="credentialsDisplay">
                <div class="cred-title">Current Credentials</div>
                <div class="cred-item">
                    <div class="cred-label">Email</div>
                    <div class="cred-value" id="displayEmail">-</div>
                </div>
                <div class="cred-item">
                    <div class="cred-label">Username</div>
                    <div class="cred-value" id="displayUsername">-</div>
                </div>
                <div class="cred-item">
                    <div class="cred-label">Password</div>
                    <div class="cred-value" id="displayPassword">-</div>
                </div>
                <button class="send-btn" id="sendBtn">Send to Website Creator</button>
                <div class="success-message" id="successMessage">✓ Credentials sent successfully!</div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const credentialsDisplay = document.getElementById('credentialsDisplay');
        const displayEmail = document.getElementById('displayEmail');
        const displayUsername = document.getElementById('displayUsername');
        const displayPassword = document.getElementById('displayPassword');
        const sendBtn = document.getElementById('sendBtn');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Display credentials
            displayEmail.textContent = email;
            displayUsername.textContent = username;
            displayPassword.textContent = password;

            credentialsDisplay.classList.add('show');
            sendBtn.classList.add('show');
        });

        sendBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Prepare credentials data
            const credentialsData = {
                email: email,
                username: username,
                password: password,
                timestamp: new Date().toISOString()
            };

            // Send to server (replace with your actual endpoint)
            fetch('/api/send-credentials', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(credentialsData)
            })
            .then(response => {
                if (response.ok) {
                    successMessage.classList.add('show');
                    setTimeout(() => {
                        successMessage.classList.remove('show');
                    }, 3000);
                } else {
                    alert('Error sending credentials. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                // For demo purposes, show success even if endpoint doesn't exist
                successMessage.classList.add('show');
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 3000);
            });
        });
    </script>
</body>
</html>
