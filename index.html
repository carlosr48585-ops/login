<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Login</title>\n    <style>\n        /* Loading spinner styles */\n        #loading {\n            display: none;\n            position: fixed;\n            left: 50%;\n            top: 50%;\n            transform: translate(-50%, -50%);\n            z-index: 1000;\n            text-align: center;\n        }\n        .spinner {\n            border: 8px solid #f3f3f3; /* Light grey */\n            border-top: 8px solid #3498db; /* Blue */\n            border-radius: 50%;\n            width: 50px;\n            height: 50px;\n            animation: spin 2s linear infinite;\n        }\n        @keyframes spin {\n            0% { transform: rotate(0deg); }\n            100% { transform: rotate(360deg); }\n        }\n    </style>\n</head>\n<body>\n    <form id="login-form">\n        <input type="text" name="username" required />\n        <input type="password" name="password" required />\n        <button type="submit">Account Made</button>\n    </form>\n    <div id="loading">\n        <div class="spinner"></div>\n        <p>Sending credentials to carlosr48585@gmail.com...</p>\n    </div>\n    <p id="success-message" style="display:none;">Account created successfully!</p>\n    <script>\n        document.getElementById('login-form').onsubmit = function(event) {\n            event.preventDefault();\n            document.getElementById('loading').style.display = 'block';\n\n            // Simulate sending credentials and show success message after delay\n            setTimeout(function() {\n                // Reset the form\n                document.getElementById('login-form').reset();\n                document.getElementById('loading').style.display = 'none';\n                document.getElementById('success-message').style.display = 'block';\n            }, 3000); // Simulate network delay\n        };\n    <\/script>\n</body>\n</html>\n
